worker_processes auto;

events {
    worker_connections 4096;
}

http {
    upstream gateway_backend {
        # Round-robin/ip_hash entre as instâncias do WebSocket Gateway.
        # OBS: a afinidade real por SALA (ADR-002) exigiria roteamento pela chave
        # "room" (ex.: hashing consistente por Redis ou Lua no NGINX), o que está
        # fora do escopo mínimo deste POC — aqui usamos ip_hash como aproximação
        # de sticky session por jogador.
        ip_hash;
        server gateway:8080;
    }

    server {
        listen 80;

        location /ws {
            proxy_pass http://gateway_backend/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /healthz {
            proxy_pass http://gateway_backend/healthz;
        }

        location /metrics {
            proxy_pass http://gateway_backend/metrics;
        }
    }
}
