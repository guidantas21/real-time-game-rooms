global:
  scrape_interval: 5s

# Coleta direta dos endpoints /metrics expostos pelos serviços Go (self-instrumented).
# O otel-collector fica disponível para receber métricas via OTLP caso, em uma
# evolução futura, a instrumentação passe a usar o SDK OpenTelemetry (item 3.7).
scrape_configs:
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:8080']

  - job_name: 'room-service'
    static_configs:
      - targets: ['room-service:8081']
